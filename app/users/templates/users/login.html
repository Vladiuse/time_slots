{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block scripts %}
{% endblock %}

{% block content %}
<div class="container vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow" style="width: 400px;">
        <div class="card-body p-4">
            <h5 class="card-title text-center mb-4">Вход в систему</h5>
            <form method="post">
                {% csrf_token %}
                <div class="form-floating mb-3">
                    <input type="text" name="username" id="username" class="form-control" required autofocus placeholder="Логин">
                    <label for="username">Логин</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" name="password" id="password" class="form-control" required placeholder="Пароль">
                    <label for="password">Пароль</label>
                </div>
                {% if form.errors %}
                <div class="alert alert-danger py-2">Неверный логин или пароль.</div>
                {% endif %}
                <button type="submit" class="btn btn-primary w-100">Войти</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
